# Local development HTTPS with self-signed cert
# Usage: nginx -c /etc/nginx/nginx.local.conf

user nginx;
worker_processes 1;
error_log /dev/stderr warn;

events { worker_connections 256; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    /dev/stdout;
    server_tokens off;

    upstream backend  { server backend:8000;  }
    upstream frontend { server frontend:3000; }

    server {
        listen 80;
        server_name localhost;

        location /ws/    { proxy_pass http://backend; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; proxy_read_timeout 3600s; }
        location /api/   { proxy_pass http://backend;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /       { proxy_pass http://frontend; proxy_set_header Host $host; }
    }
}
