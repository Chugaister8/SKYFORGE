# SKYFORGE — Nginx reverse proxy config
# Handles: SSL termination, WebSocket upgrade, gzip, rate limiting, security headers

user nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"referrer":"$http_referer",'
            '"agent":"$http_user_agent",'
            '"req_id":"$request_id",'
            '"upstream_time":"$upstream_response_time",'
            '"duration":"$request_time"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    server_tokens      off;   # hide nginx version

    # ── Compression ────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # ── Rate limiting zones ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m   rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m      rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_register:10m  rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream backends ──────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ──────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

        # Modern SSL config
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-XSS-Protection          "1; mode=block"                       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # Request ID for correlation
        add_header X-Request-ID $request_id always;

        limit_conn conn_limit 20;
        client_max_body_size 10m;

        # ── WebSocket telemetry ─────────────────────────────
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Request-ID $request_id;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── API: auth endpoints (strict rate limit) ──────────
        location /api/auth/login {
            limit_req zone=api_auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass         http://backend;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Request-ID $request_id;
        }

        location /api/auth/register {
            limit_req zone=api_register burst=3 nodelay;
            limit_req_status 429;
            proxy_pass         http://backend;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Request-ID $request_id;
        }

        # ── API: general ─────────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID $request_id;
            proxy_read_timeout 60s;

            # Hide internal headers
            proxy_hide_header  X-Powered-By;
        }

        # ── Static assets (Next.js) ───────────────────────────
        location /_next/static/ {
            proxy_pass     http://frontend;
            proxy_set_header Host $host;
            expires        1y;
            add_header     Cache-Control "public, immutable";
            access_log     off;
        }

        # ── Frontend ──────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Request-ID $request_id;
            proxy_read_timeout 30s;
        }
    }
}
