# SKYFORGE — Production compose
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Required env vars: SECRET_KEY, DOMAIN, POSTGRES_PASSWORD

version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - skyforge-net
    restart: always
    environment:
      - DOMAIN=${DOMAIN}
    # Nginx needs envsubst for ${DOMAIN} in config
    command: >
      sh -c "envsubst '$$DOMAIN' < /etc/nginx/nginx.conf > /tmp/nginx.conf
      && nginx -c /tmp/nginx.conf -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run certbot manually: docker-compose run certbot certonly --webroot ...
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:      https://${DOMAIN}
        NEXT_PUBLIC_CESIUM_TOKEN: ${NEXT_PUBLIC_CESIUM_TOKEN:-}
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - skyforge-net
    restart: always
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout:  10s
      retries:  3

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+asyncpg://skyforge:${POSTGRES_PASSWORD}@postgres:5432/skyforge
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=https://${DOMAIN}
      - RATE_LIMIT_LOGIN=10/minute
      - RATE_LIMIT_REGISTER=5/minute
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skyforge-net
    restart: always
    # Run alembic migrations before starting
    command: >
      sh -c "alembic upgrade head && uvicorn main:app
      --host 0.0.0.0 --port 8000 --workers 2
      --proxy-headers --forwarded-allow-ips '*'"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     skyforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       skyforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U skyforge"]
      interval: 5s
      timeout:  5s
      retries:  5
    networks:
      - skyforge-net
    restart: always

  redis:
    image: redis:7-alpine
    command: >
      redis-server --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  5s
      retries:  5
    networks:
      - skyforge-net
    restart: always

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:
  nginx_logs:

networks:
  skyforge-net:
    driver: bridge
