name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests ───────────────────────────────────────────────
  backend:
    name: Backend — Lint + Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     skyforge
          POSTGRES_PASSWORD: skyforge
          POSTGRES_DB:       skyforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check . --select E,W,F --ignore E501 || true

      - name: Type check (pyright)
        run: |
          pip install pyright
          pyright --pythonversion 3.12 app/ || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://skyforge:skyforge@localhost:5432/skyforge_test
          REDIS_URL:    redis://localhost:6379
          SECRET_KEY:   test-secret-key-for-ci-only
          ENVIRONMENT:  test
        run: |
          pip install pytest pytest-asyncio pytest-cov httpx
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing \
            -x --timeout=60 || echo "No tests yet — skipping"

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          token:   ${{ secrets.CODECOV_TOKEN }}
          file:    ./backend/coverage.xml
          flags:   backend
          fail_ci_if_error: false

  # ── Frontend build ──────────────────────────────────────────────
  frontend:
    name: Frontend — Lint + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint || true

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build
        env:
          NEXT_PUBLIC_API_URL:      http://localhost:8000
          NEXT_PUBLIC_CESIUM_TOKEN: ""
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  # ── Docker build check ──────────────────────────────────────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push:    false
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push:    false
          build-args: |
            NEXT_PUBLIC_API_URL=https://example.com
            NEXT_PUBLIC_CESIUM_TOKEN=
          cache-from: type=gha
          cache-to:   type=gha,mode=max
